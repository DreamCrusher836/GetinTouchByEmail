<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get in touch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="form-heading">
      <h1 id="form-heading">Get in touch</h1>
      <p class="subtext">Have a question or just want to say hello? Send us a message.</p>

      <form id="contact-form" novalidate>
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" autocomplete="name" />
          <span id="name-error" class="error" aria-live="polite"></span>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            aria-describedby="email-error"
          />
          <span id="email-error" class="error" aria-live="polite"></span>
        </div>

        <div class="field">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="4"></textarea>
          <span id="message-error" class="error" aria-live="polite"></span>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </section>
  </main>

  <!-- EmailJS SDK: lets the static site send email without a backend -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
